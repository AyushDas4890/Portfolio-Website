<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Instant Music Recommendation System">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1019"/><stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1DB954"/><stop offset="1" stop-color="#7afcd0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1b2434" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="320" rx="18" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="18" fill="url(#grid)" opacity="0.5"/>
  <circle cx="1080" cy="160" r="240" fill="#1DB954" opacity="0.07"/>
  <!-- equalizer waveform motif -->
  <g transform="translate(960,160)" fill="url(#wave)">
    <rect x="0"   y="-30" width="12" height="60"  rx="6"/>
    <rect x="24"  y="-60" width="12" height="120" rx="6"/>
    <rect x="48"  y="-44" width="12" height="88"  rx="6"/>
    <rect x="72"  y="-80" width="12" height="160" rx="6"/>
    <rect x="96"  y="-50" width="12" height="100" rx="6"/>
    <rect x="120" y="-70" width="12" height="140" rx="6"/>
    <rect x="144" y="-34" width="12" height="68"  rx="6"/>
    <rect x="168" y="-58" width="12" height="116" rx="6"/>
    <rect x="192" y="-26" width="12" height="52"  rx="6"/>
  </g>
  <text x="70" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="20" letter-spacing="5" fill="#7afcd0">RECOMMENDER SYSTEM · CONTENT-BASED ML</text>
  <text x="68" y="190" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="700" fill="#eef3fb">Instant Music Recommendation</text>
  <text x="70" y="232" font-family="'Segoe UI',Arial,sans-serif" font-size="23" fill="#9fb0c4">Pick a song, get five similar tracks — instantly, with TF-IDF similarity.</text>
  <g font-family="'Consolas',monospace" font-size="15" fill="#cfe0f5">
    <rect x="70" y="258" width="104" height="30" rx="8" fill="#13203a" stroke="#27406b"/><text x="86" y="278">Streamlit</text>
    <rect x="186" y="258" width="78" height="30" rx="8" fill="#13203a" stroke="#27406b"/><text x="202" y="278">TF-IDF</text>
    <rect x="276" y="258" width="118" height="30" rx="8" fill="#13203a" stroke="#27406b"/><text x="292" y="278">scikit-learn</text>
    <rect x="406" y="258" width="86" height="30" rx="8" fill="#13203a" stroke="#27406b"/><text x="422" y="278">Pandas</text>
  </g>
</svg>
